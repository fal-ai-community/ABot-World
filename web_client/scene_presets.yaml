        prompt: "A modest, single-story suburban house with weathered stucco walls, a low-pitched shingled roof, and striped awnings over the windows sits behind a sagging chain-link fence, flanked by overgrown shrubs and a mature palm tree; distant glass-and-steel skyscrapers pierce the hazy skyline, contrasting sharply with the sun-bleached, faded earth tones of the foreground. The street is lined with cracked concrete sidewalks, utility poles strung with overhead wires, and scattered debris, while a rusted sedan rests beside a garage under a row of tall palms. Adjacent commercial structures feature peeling signage—“Beer • Wine” and a vintage “Busch” billboard—above corrugated metal facades, all bathed in bright, diffused daylight that casts soft shadows and emphasizes textures of aged paint, dry grass, and worn asphalt. The overall aesthetic evokes a sun-drenched, slightly neglected urban fringe, where mid-century residential architecture meets fading commercial infrastructure under a pale blue sky."
