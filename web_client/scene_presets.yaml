# 唯一配置：首帧参考图 + Prompt。启动时只读此文件。
#
# default_prompt — 全局默认 prompt；支持 .json 文件路径（读取 scene_static）或直接字符串；
#                  条目省略 prompt 时继承此值
# default_index — 启动时选中的条目序号（从 0 起）
#
# groups[].items[]:
#   image — 图片路径（相对于 web_client/）
#   prompt — 支持 .json 文件路径（读取 scene_static）或直接字符串；省略则用 default_prompt
#   label — 可选，画廊标题

default_index: 0

default_prompt: "A realistic outdoor world scene with a navigable path, natural lighting, detailed ground texture, and stable forward motion."

